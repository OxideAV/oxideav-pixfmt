name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --verbose

      - name: Test
        run: cargo test --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt -- --check
        run: cargo fmt -- --check

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  nightly:
    name: Build & test (nightly, --features nightly)
    runs-on: ubuntu-latest
    # Nightly can regress on unstable features (portable_simd) — don't block
    # the merge queue. This job is informational: a red X tells us the
    # std::simd path needs attention, but stable CI still gates merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly

      - name: Build --features nightly
        run: cargo build --all-targets --features nightly

      # Force the portable_simd dispatch path at runtime so the std::simd
      # code is actually executed by the parity tests — otherwise the AVX2
      # path would be chosen on GitHub runners and the nightly-only code
      # would only be compile-checked.
      - name: Test --features nightly (force portable_simd)
        env:
          OXIDEAV_PIXFMT_FORCE_PORTABLE_SIMD: "1"
        run: cargo test --features nightly

  miri:
    name: miri (nightly, strict-provenance)
    runs-on: ubuntu-latest
    # Catches UB regressions in the SIMD swizzle / palette / pixel-format
    # conversion code, where raw-pointer arithmetic and unchecked casts
    # are common. Org-wide policy is miri-on; pixfmt opts in here even
    # though it stays on a custom CI rather than the centralized shim
    # (because of the arm64 + nightly-features-job customizations).
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: cargo miri setup
        run: cargo miri setup

      - name: cargo miri test
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
        run: cargo miri test --all-targets
