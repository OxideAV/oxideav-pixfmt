# release-plz config — https://release-plz.dev/docs/config

[workspace]
changelog_path = "./CHANGELOG.md"
allow_dirty = false

git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# Stay on 0.1.x during heavy dev. Disable cargo-semver-checks so
# release-plz does not refuse a patch bump on a breaking change, and
# force patch-only bumps via never-match overrides — 0.x → 0.y churn
# cascades through every dependent's version pin.
semver_check = false
custom_major_increment_regex = "^___never_match___"
custom_minor_increment_regex = "^___never_match___"
