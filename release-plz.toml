# release-plz config — https://release-plz.dev/docs/config

[workspace]
changelog_path = "./CHANGELOG.md"
allow_dirty = false

git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# Release automation is temporarily disabled on this crate. The 0.0.3
# release was cut from the pre-extraction workspace (commit 4255450 had
# `edition.workspace = true` inheritance pointing at a root Cargo.toml
# that no longer exists in this standalone repo). release-plz cannot
# reproduce that historical tarball for its equality check and fails on
# every push. Re-enable after setting a retroactive baseline tag at the
# extraction commit or rewriting history to drop the workspace commits.
[[package]]
name = "oxideav-pixfmt"
release = false
